<!DOCTYPE html>
<html>
    <head>
    <link rel="stylesheet" href="../style.css">
    <title>Contrôle aérien FLygana</title>
    </head>
    <body>
        <div class="un">
            <h1>Créer un nouveau vol</h1>
            <form>
            <label>Entrez l'aéroport de départ: <input type="text" id="Adep"> </label> <br><br>
            <label>Entrez l'aéroport d'arrivée: <input type="text" id="Aarr"> </label>  <br><br>
            <label>Entrez la distance du vol: <input type="number" id="dist"> </label>  <br><br>
            <label>Entrez l'heure de départ du vol: <input type="text" id="horaire"> </label>  <br><br>
            <label>Entrez le nombre de places du vol: <input type="number" id="places"> </label>  <br><br>
            <label>Entrez le numéro du vol (IMPORTANT): <input type="text" id="Nvol"> </label> <br> <p>Attention à ne pas saisir
                 deux fois le même numéro de vol afin de ne pas faire planter le système.</p> <br><br>
            <button onclick="createVol(event)">Créer un vol</button>
            </form>
        </div>



        <div class="un" id="cont"> 
        </div>
        

    
        <div class="un">
            
            <label>Sélectionner le numéro de vol à supprimer (s'il y a plusieurs fois le même numéro de vol, veuillez sélectionner l'un d'eux. Cela les supprimera tous.) :</label> <br><br>
            <select id="delBilSet">
            </select>  <br><br>
            <button id="supbil">Supprimer les billets (après le vol)</button>
            
        </div>



        <script src="script.js"></script>
    </body>
</html>
